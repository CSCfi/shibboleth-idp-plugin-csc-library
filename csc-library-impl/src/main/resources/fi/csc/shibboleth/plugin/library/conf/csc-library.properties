# CSC Library properties

## Per upstream client ids to be used if bean 'csclib.OIDC.UpstreamClientIdLookupStrategy' is used as upstream client id strategy.
## Format is JSON with upstream issuer value as a key to client id. {"default": "default_clientId", "https://upstreamOP1.com", "upstreamOP1_clientId", "https://upstreamOP2.com", "upstreamOP2_clientId"} 
# csclib.oidc.upstream.clientIds =

## Per upstream client ids to be used if bean 'csclib.OIDC.UpstreamClientCredentialsLookupStrategy' is used as upstream client credentials strategy.
## Format is JSON with upstream issuer value as a key to client id. {"default": "default_clientSecret", "https://upstreamOP1.com", "upstreamOP1_Secret", "https://upstreamOP2.com", "upstreamOP2_Secret"}
# csclib.oidc.upstream.clientCredentials =

## Whether to populate MDC keys csclib.traceparent_traceid, csclib.traceparent_parentid and csclib.traceparent_traceflags per traceparent header or request parameter. 
# csclib.logging.MDC.enabled = true

## Strategy to populate event content. Defaults to csclib.DefaultEventContentLookupStrategy
# csclib.eventContentLookupStrategy = csclib.DefaultEventContentLookupStrategy  

## Maximum number of items event buffer can hold. Defaults to 1000.
# csclib.eventStore.maxBufferItems = 1000

## Defining endpoint starts the http informer service that processes buffer items. No default.
# csclib.httpInformer.endpoint =

## Failure codes that suggest http informer should discard the failed event.
# csclib.httpInformer.finalFailureCodes:400,401,403,404,405,409,410,415,422

## Json string map of headers added to http request as in {"Header1":"Header1Value", "Header2":"Header2Value"}. No default.
# csclib.httpInformer.headers = 